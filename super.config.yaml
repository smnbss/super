version: "1.0"

# Super - Cross-CLI Session Bridge Configuration
# Works with: Claude Code, Gemini CLI, Codex CLI, Kimi Code CLI

security:
  yoloMode: true                # Skip all permission prompts (security hook still enforces rules)
  writesOutsideProject: ask     # block | allow | ask — writes outside project root
  readsOutsideProject: allow    # block | allow | ask — reads outside project root
  bashExternalCalls: ask        # block | allow | ask — curl POST, npm publish, docker push
  changeOwner: block            # block | allow | ask — chmod, chown commands
  githubCommands: allow         # block | allow | ask — git push, gh pr create, etc.
  dangerousRm: block            # block | allow | ask — rm -rf with risky paths
  envAccess: block              # block | allow | ask — reading .env files
  sensitivePaths: block         # block | allow | ask — ~/.ssh, ~/.aws, credentials

session:
  autoName: true                # Generate creative session names
  sessionLog: true              # Log user prompts to session directory
  transcriptLog: true           # Save rolling transcript after each turn
  cleanupOnStart: true          # Remove old sessions on startup
  maxAgeDays: 7                 # Delete sessions older than this
  injectContext: true           # Inject session history into CLI context files

skills:
  gstack:
    source: garrytan/gstack
    setup: ./setup
    enabled: true
  requesting-code-review:
    source: obra/superpowers/requesting-code-review
    enabled: true
  code-simplifier:
    source: simonwong/agent-skills/code-simplifier
    enabled: true
  playwright-cli:
    source: microsoft/playwright-cli/playwright-cli
    enabled: true
  frontend-design:
    source: anthropics/claude-plugins-official/frontend-design
    enabled: true
  security-review:
    source: affaan-m/everything-claude-code/security-review
    enabled: true
  verification-before-completion:
    source: obra/superpowers/verification-before-completion
    enabled: true
  systematic-debugging:
    source: obra/superpowers/systematic-debugging
    enabled: true
  test-driven-development:
    source: obra/superpowers/test-driven-development
    enabled: true
  writing-plans:
    source: obra/superpowers/writing-plans
    enabled: true
  executing-plans:
    source: obra/superpowers/executing-plans
    enabled: true
  when-stuck:
    source: obra/superpowers/when-stuck
    enabled: false
  receiving-code-review:
    source: obra/superpowers/receiving-code-review
    enabled: false
  using-git-worktrees:
    source: obra/superpowers/using-git-worktrees
    enabled: false
  subagent-driven-development:
    source: obra/superpowers/subagent-driven-development
    enabled: false

plugins:
  weroad-ai:
    source: weroad/ai
    description: WeRoad AI plugins — skills + commands
    enabled: true

mcps:
  context7:
    command: npx
    args: ["-y", "@upstash/context7-mcp"]
    description: Up-to-date docs for libraries and frameworks
    enabled: true
  deepwiki:
    command: npx
    args: ["-y", "mcp-deepwiki@latest"]
    description: AI-powered GitHub repo documentation
    enabled: true
  # agentdb:
  #   command: npx
  #   args: ["-y", "agentdb@latest", "mcp", "start"]
  #   description: SQLite graph DB for persistent memory
  #   enabled: false

project:
  lintCommand: ""               # Run after code changes (empty = skip)
  typeCheckCommand: ""          # Run after code changes (empty = skip)

hooks:
  preToolUse:
    enabled: true
    enforceSecurity: true
  permissionRequest:
    enabled: true
    autoAllowReads: true
    autoAllowSafeBash: true
  userPromptSubmit:
    enabled: true
    logPrompts: true
  postToolUse:
    enabled: true
    runValidators: true
  sessionStart:
    enabled: true
  sessionEnd:
    enabled: true
    saveTranscript: true
  stop:
    enabled: true
    saveTranscript: true

statusLine:
  enabled: true

crossAgent:
  syncMcpServers: false
  shareContext: true
  unifiedSkills: true

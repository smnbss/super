version: "3.0"

# Super - Cross-CLI Session Bridge Configuration
# Works with: Claude Code, Gemini CLI, Codex CLI
#
# This file is a REFERENCE CATALOG — it declares what's available and
# whether it's enabled. `super install` reads this and uses each CLI's
# native mechanism to install (correct paths, formats, and tools).
#
# Skills:  cloned to .agents/skills/ (Claude) or ~/.<cli>/skills/ (others)
# Plugins: installed via `claude plugins install` (Claude only)
# MCPs:    configured in each CLI's native settings file

system:
  uv:
    name: uv
    check: "command -v uv"
    install: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    enabled: true

  markitdown:
    name: markitdown
    check: "command -v markitdown"
    install: "export PATH=\"$HOME/.local/bin:$PATH\" && uv tool install markitdown"
    enabled: true

  ollama:
    name: ollama
    check: "command -v ollama"
    install: "curl -fsSL https://ollama.com/install.sh | sh"
    enabled: true

# ─── CLIs ────────────────────────────────────────────────────────────────────
# Install commands for each supported CLI. `super install` will run these
# automatically if the CLI is not already on PATH.

clis:
  claude:
    install: "curl -fsSL https://claude.ai/install.sh | bash"
    check: "command -v claude"
    enabled: true
  gemini:
    install: "npm install -g @google/gemini-cli"
    check: "command -v gemini"
    enabled: true
  codex:
    install: "npm install -g @openai/codex"
    check: "command -v codex"
    enabled: true

security:
  yoloMode: true
  writesOutsideProject: ask
  readsOutsideProject: allow
  bashExternalCalls: ask
  changeOwner: block
  githubCommands: allow
  dangerousRm: block
  envAccess: block
  sensitivePaths: block

session:
  autoName: true
  sessionLog: true
  transcriptLog: true
  cleanupOnStart: true
  maxAgeDays: 7
  injectContext: true

# ─── Skills ──────────────────────────────────────────────────────────────────
# source: owner/repo or owner/repo/subpath (GitHub)
# Claude: cloned to .agents/skills/<name>/ (project-level)
# Gemini/Codex: cloned to ~/.<cli>/skills/<name>/

skills:
  gstack:
    source: garrytan/gstack
    setup: ./setup
    description: Dev workflow toolkit (review, security, ship, debug, QA)
    enabled: true
  playwright-cli:
    source: microsoft/playwright-cli/skills/playwright-cli
    description: Browser testing with Playwright
    enabled: true
  brain-pull-sources:
    source: smnbss/brain/skills/brain-pull-sources
    description: Export all external sources — ClickUp, Confluence, GDrive, Linear, GitHub, Medium, Metabase
    enabled: true
  brain-rebuild-services:
    source: smnbss/brain/skills/brain-rebuild-services
    description: Generate deep service .AGENT.MD docs from cloned GitHub repos
    enabled: true
  brain-rebuild-memory:
    source: smnbss/brain/skills/brain-rebuild-memory
    description: Rebuild L2 (domain knowledge) and L1 (navigation MOCs) from src/ + outputs/services/
    enabled: true
  brain-pull-my-meeting-notes:
    source: smnbss/brain/skills/brain-pull-my-meeting-notes
    description: Harvest meeting notes, recordings, and transcripts from Google Calendar and Drive
    enabled: true
  brain-prepare-my-one-on-one:
    source: smnbss/brain/skills/brain-prepare-my-one-on-one
    description: Prepare 1:1 meeting agendas from Linear, brain context, and previous agendas
    enabled: true
  brain-prepare-my-deep-dives:
    source: smnbss/brain/skills/brain-prepare-my-deep-dives
    description: Prepare deep-dive meeting agendas from Linear project data per team
    enabled: true
  brain-morning-start:
    source: smnbss/brain/skills/brain-morning-start
    description: Daily bootstrap — update tools, sync brain, harvest meeting notes, prepare agendas
    enabled: true
  brain-git-sync:
    source: smnbss/brain/skills/brain-git-sync
    description: Commit and push all brain changes
    enabled: true
  brain-push-reports:
    source: smnbss/brain/skills/brain-push-reports
    description: Push latest agent report outputs to ClickUp document pages
    enabled: true
  brain-weekly-review:
    source: smnbss/brain/skills/brain-weekly-review
    description: Compile weekly summary from Workflowy, X posts, and Linear updates
    enabled: true
  brain-linear-create-project-context:
    source: smnbss/brain/skills/brain-linear-create-project-context
    description: Enrich a Linear project description with structured context from its issues
    enabled: true
  brain-linear-process-ideas:
    source: smnbss/brain/skills/brain-linear-process-ideas
    description: Pick next "Idea:" issue from a Linear project and refine it in 3 passes
    enabled: true
  brain-linear-process-tasks:
    source: smnbss/brain/skills/brain-linear-process-tasks
    description: Pick next task from a Linear project, implement it, commit, and mark done
    enabled: true
# ─── Plugins ─────────────────────────────────────────────────────────────────
# Plugins are GitHub repos that bundle multiple skills (and optionally commands).
# Installing a plugin clones the repo and auto-discovers:
#   - Skills:   skills/*/SKILL.md  OR  plugins/*/skills/*/SKILL.md
#   - Commands: plugins/*/commands/*.md
#   - Claude marketplace config → .claude/settings.json
# Repos without discoverable content are treated as Claude-only marketplaces.

plugins:
  obra-superpowers:
    source: obra/superpowers
    description: Core methodology marketplace — code review, debugging, TDD, planning
    enabled: true
  weroad-ai:
    source: weroad/ai
    description: WeRoad AI — dbt-modeling, presentations, devops, data-analyst, codex
    enabled: true
  marketing-skills:
    source: marketingskills/marketing-skills
    description: Marketing skills — copy, SEO, ads, CRO, email, social
    enabled: true
  frontend-design:
    source: claude-plugins-official/frontend-design
    description: Production-grade UI design
    enabled: true
  skill-creator:
    source: claude-plugins-official/skill-creator
    description: Create and manage custom skills
    enabled: true
  discord:
    source: claude-plugins-official/discord
    description: Discord bot integration
    enabled: true
  telegram:
    source: claude-plugins-official/telegram
    description: Telegram bot integration
    enabled: true
  codex:
    source: openai-codex/codex
    description: OpenAI Codex CLI integration
    enabled: true

# ─── MCPs — Installable (stdio + http) ──────────────────────────────────────
# Installed to each CLI's native config:
#   Claude: .claude/settings.local.json (project-level, dict)
#   Gemini: ~/.gemini/settings.json (dict)
#   Codex:  ~/.codex/config.json (array format)
#
# type: http → url-based transport | type: stdio → command + args
#
# Use $env:VAR_NAME to reference secrets from .env.local (or .env).
# `super install` resolves these at install time and bakes the values
# into each CLI's config. Re-run `super install` after rotating tokens.

mcps:
  # Disabled — using bq CLI instead
  # bigquery:
  #   type: http
  #   url: https://bigquery.googleapis.com/mcp
  #   description: Google BigQuery via HTTP MCP (uses ADC token)
  #   enabled: false
  linear:
    type: http
    url: https://mcp.linear.app/mcp
    headers:
      Authorization: "Bearer $env:LINEAR_TOKEN"
    description: Linear project management (requires LINEAR_TOKEN in .env.local)
    enabled: true
  metabase:
    type: stdio
    command: npx
    args: ["-y", "@cognitionai/metabase-mcp-server", "--all"]
    env:
      METABASE_URL: "$env:METABASE_URL"
      METABASE_API_KEY: "$env:METABASE_API_KEY"
    description: Metabase analytics (requires METABASE_URL, METABASE_API_KEY in .env.local)
    enabled: true
  design-system-extractor:
    type: stdio
    command: npx
    args: ["-y", "website-design-systems-mcp"]
    description: Extract design systems from any URL to DESIGN.md
    enabled: true
  chrome-devtools:
    type: stdio
    command: npx
    args: ["-y", "chrome-devtools-mcp@latest"]
    description: Chrome DevTools — screenshots, DOM, network, console
    enabled: true

# ─── MCPs — Remote (claude.ai Settings > Integrations) ──────────────────────
# Configured through the web UI, not CLI. Listed here as reference only.

remote_mcps:
  amplitude-eu:
    description: Amplitude EU analytics
    enabled: true
  atlassian:
    description: Jira + Confluence
    enabled: true
  clickup:
    description: ClickUp project management
    enabled: true
  deepwiki:
    description: AI-powered GitHub repo documentation
    enabled: true
  gmail:
    description: Gmail integration
    enabled: true
  google-calendar:
    description: Google Calendar
    enabled: true
  jam:
    description: Jam bug reporting
    enabled: true
  sentry:
    description: Sentry error tracking
    enabled: true
  slack:
    description: Slack messaging
    enabled: true
  n8n:
    description: n8n workflow automation
    enabled: true
  canva:
    description: Canva design
    enabled: false
  gamma:
    description: Gamma presentations
    enabled: false
  ahrefs:
    description: Ahrefs SEO
    enabled: false

project:
  lintCommand: ""
  typeCheckCommand: ""

hooks:
  preToolUse:
    enabled: true
    enforceSecurity: true
  permissionRequest:
    enabled: true
    autoAllowReads: true
    autoAllowSafeBash: true
  userPromptSubmit:
    enabled: true
    logPrompts: true
  postToolUse:
    enabled: true
    runValidators: true
  sessionStart:
    enabled: true
  sessionEnd:
    enabled: true
    saveTranscript: true
  stop:
    enabled: true
    saveTranscript: true

statusLine:
  enabled: true

crossAgent:
  syncMcpServers: false
  shareContext: true
  unifiedSkills: true

version: "3.0"

# Super - Cross-CLI Session Bridge Configuration
# Works with: Claude Code, Gemini CLI, Codex CLI, Kimi Code CLI
#
# This file is a REFERENCE CATALOG — it declares what's available and
# whether it's enabled. `super install` reads this and uses each CLI's
# native mechanism to install (correct paths, formats, and tools).
#
# Skills:  cloned to .agents/skills/ (Claude) or ~/.<cli>/skills/ (others)
# Plugins: installed via `claude plugins install` (Claude only)
# MCPs:    configured in each CLI's native settings file

system:
  uv:
    name: uv
    check: "command -v uv"
    install: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    enabled: true

  markitdown:
    name: markitdown
    check: "command -v markitdown"
    install: "export PATH=\"$HOME/.local/bin:$PATH\" && uv tool install markitdown"
    enabled: true

# ─── CLIs ────────────────────────────────────────────────────────────────────
# Install commands for each supported CLI. `super install` will run these
# automatically if the CLI is not already on PATH.

clis:
  claude:
    install: "sudo npm install -g @anthropic-ai/claude-code"
    check: "command -v claude"
    enabled: true
  gemini:
    install: "sudo npm install -g @google/gemini-cli"
    check: "command -v gemini"
    enabled: true
  codex:
    install: "sudo npm install -g @openai/codex"
    check: "command -v codex"
    enabled: true
  kimi:
    install: "export PATH=\"$HOME/.local/bin:$PATH\" && uv tool install kimi-cli"
    check: "command -v kimi"
    enabled: true

security:
  yoloMode: true
  writesOutsideProject: ask
  readsOutsideProject: allow
  bashExternalCalls: ask
  changeOwner: block
  githubCommands: allow
  dangerousRm: block
  envAccess: block
  sensitivePaths: block

session:
  autoName: true
  sessionLog: true
  transcriptLog: true
  cleanupOnStart: true
  maxAgeDays: 7
  injectContext: true

# ─── Skills ──────────────────────────────────────────────────────────────────
# source: owner/repo or owner/repo/subpath (GitHub)
# Claude: cloned to .agents/skills/<name>/ (project-level)
# Gemini/Codex/Kimi: cloned to ~/.<cli>/skills/<name>/

skills:
  gstack:
    source: garrytan/gstack
    setup: ./setup
    description: Dev workflow toolkit (review, security, ship, debug, QA)
    enabled: true
  requesting-code-review:
    source: obra/superpowers/skills/requesting-code-review
    description: Structured code review methodology
    enabled: true
  playwright-cli:
    source: microsoft/playwright-cli/skills/playwright-cli
    description: Browser testing with Playwright
    enabled: true
  verification-before-completion:
    source: obra/superpowers/skills/verification-before-completion
    description: Thoroughness before claiming done
    enabled: true
  systematic-debugging:
    source: obra/superpowers/skills/systematic-debugging
    description: Root cause investigation methodology
    enabled: true
  test-driven-development:
    source: obra/superpowers/skills/test-driven-development
    description: Write tests first, then implement
    enabled: true
  writing-plans:
    source: obra/superpowers/skills/writing-plans
    description: Structured plan creation
    enabled: true
  executing-plans:
    source: obra/superpowers/skills/executing-plans
    description: Staying scoped when executing plan tasks
    enabled: true
  receiving-code-review:
    source: obra/superpowers/skills/receiving-code-review
    description: How to respond to review feedback
    enabled: false
  using-git-worktrees:
    source: obra/superpowers/skills/using-git-worktrees
    description: Isolated feature work in worktrees
    enabled: false
  subagent-driven-development:
    source: obra/superpowers/skills/subagent-driven-development
    description: Multi-agent coordination patterns
    enabled: false
  brainstorming:
    source: obra/superpowers/skills/brainstorming
    description: Structured brainstorming methodology
    enabled: false
  writing-skills:
    source: obra/superpowers/skills/writing-skills
    description: How to write effective skills
    enabled: false
  weroad-brain-sync:
    source: smnbss/brain/.agents/skills/weroad-brain-sync
    description: Sync the WeRoad Brain — re-export all external sources and refresh memory
    enabled: true

# ─── Commands ────────────────────────────────────────────────────────────────
# source: owner/repo/subpath (GitHub)
# Copies all .md files from the subpath to each CLI's commands directory.

commands:
  brain-commands:
    source: smnbss/brain/.agents/commands
    description: WeRoad Brain agent commands (brain-sync, rebuild-memory, rebuild-services-docs)
    enabled: true

# ─── Plugins ─────────────────────────────────────────────────────────────────
# Claude only — installed via: claude plugins install <source>
# source: marketplace/plugin-name
# Other CLIs have no equivalent plugin system

plugins:
  weroad-ai:
    source: weroad/ai
    description: WeRoad AI — dbt-modeling, presentations, devops, data-analyst, codex
    enabled: true
  marketing-skills:
    source: marketingskills/marketing-skills
    description: Marketing skills — copy, SEO, ads, CRO, email, social
    enabled: true
  frontend-design:
    source: claude-plugins-official/frontend-design
    description: Production-grade UI design
    enabled: true
  skill-creator:
    source: claude-plugins-official/skill-creator
    description: Create and manage custom skills
    enabled: true
  discord:
    source: claude-plugins-official/discord
    description: Discord bot integration
    enabled: true
  telegram:
    source: claude-plugins-official/telegram
    description: Telegram bot integration
    enabled: true
  codex:
    source: openai-codex/codex
    description: OpenAI Codex CLI integration
    enabled: true

# ─── MCPs — Installable (stdio + http) ──────────────────────────────────────
# Installed to each CLI's native config:
#   Claude: .claude/settings.local.json (project-level, dict)
#   Gemini: ~/.gemini/settings.json (dict)
#   Codex:  ~/.codex/config.json (array format)
#   Kimi:   .kimi/mcp.json (project-level, dict with transport field)
#
# type: http → url-based transport | type: stdio → command + args
#
# Use $env:VAR_NAME to reference secrets from .env.local (or .env).
# `super install` resolves these at install time and bakes the values
# into each CLI's config. Re-run `super install` after rotating tokens.

mcps:
  bigquery:
    type: http
    url: https://bigquery.googleapis.com/mcp
    description: Google BigQuery via HTTP MCP (uses ADC token)
    enabled: true
  linear:
    type: http
    url: https://mcp.linear.app/mcp
    headers:
      Authorization: "Bearer $env:LINEAR_TOKEN"
    description: Linear project management (requires LINEAR_TOKEN in .env.local)
    enabled: true
  metabase:
    type: stdio
    command: npx
    args: ["-y", "@cognitionai/metabase-mcp-server", "--all"]
    env:
      METABASE_URL: "$env:METABASE_URL"
      METABASE_API_KEY: "$env:METABASE_API_KEY"
    description: Metabase analytics (requires METABASE_URL, METABASE_API_KEY in .env.local)
    enabled: true
  design-system-extractor:
    type: stdio
    command: npx
    args: ["-y", "website-design-systems-mcp"]
    description: Extract design systems from any URL to DESIGN.md
    enabled: true
  chrome-devtools:
    type: stdio
    command: npx
    args: ["@anthropic/mcp-chrome-devtools"]
    description: Chrome DevTools — screenshots, DOM, network, console
    enabled: true

# ─── MCPs — Remote (claude.ai Settings > Integrations) ──────────────────────
# Configured through the web UI, not CLI. Listed here as reference only.

remote_mcps:
  amplitude-eu:
    description: Amplitude EU analytics
    enabled: true
  atlassian:
    description: Jira + Confluence
    enabled: true
  clickup:
    description: ClickUp project management
    enabled: true
  deepwiki:
    description: AI-powered GitHub repo documentation
    enabled: true
  gmail:
    description: Gmail integration
    enabled: true
  google-calendar:
    description: Google Calendar
    enabled: true
  jam:
    description: Jam bug reporting
    enabled: true
  sentry:
    description: Sentry error tracking
    enabled: true
  slack:
    description: Slack messaging
    enabled: true
  n8n:
    description: n8n workflow automation
    enabled: true
  canva:
    description: Canva design
    enabled: false
  gamma:
    description: Gamma presentations
    enabled: false
  ahrefs:
    description: Ahrefs SEO
    enabled: false

project:
  lintCommand: ""
  typeCheckCommand: ""

hooks:
  preToolUse:
    enabled: true
    enforceSecurity: true
  permissionRequest:
    enabled: true
    autoAllowReads: true
    autoAllowSafeBash: true
  userPromptSubmit:
    enabled: true
    logPrompts: true
  postToolUse:
    enabled: true
    runValidators: true
  sessionStart:
    enabled: true
  sessionEnd:
    enabled: true
    saveTranscript: true
  stop:
    enabled: true
    saveTranscript: true

statusLine:
  enabled: true

crossAgent:
  syncMcpServers: false
  shareContext: true
  unifiedSkills: true

version: "3.0"

# Super - Cross-CLI Session Bridge Configuration
# Works with: Claude Code, Gemini CLI, Codex CLI
#
# This file is a REFERENCE CATALOG — it declares what's available and
# whether it's enabled. `super install` reads this and uses each CLI's
# native mechanism to install (correct paths, formats, and tools).
#
# Skills:  installed into the shared project skill root at .agents/skills/
# Plugins: installed via `claude plugins install` (Claude only)
# MCPs:    configured in each CLI's native settings file

system:
  uv:
    name: uv
    check: "command -v uv"
    install: "curl -LsSf https://astral.sh/uv/install.sh | sh"
    enabled: true

  markitdown:
    name: markitdown
    # Verify the markitdown CLI exists AND the optional format converters are installed.
    # markitdown 0.1.x split docx/pdf/xlsx/pptx support into the [all] extras —
    # a bare install imports cleanly but every conversion fails at runtime.
    check: >-
      command -v markitdown >/dev/null 2>&1 &&
      MD_PY="$(head -n1 "$(command -v markitdown)" 2>/dev/null | sed 's|^#!||' | awk '{print $1}')" &&
      [ -x "$MD_PY" ] &&
      "$MD_PY" -c "import mammoth, pdfminer, openpyxl, pptx" 2>/dev/null
    install: "export PATH=\"$HOME/.local/bin:$PATH\" && uv tool install --force 'markitdown[all]'"
    enabled: true

  ollama:
    name: ollama
    check: "command -v ollama"
    # ollama's installer uses zstd on Linux — install it first if missing
    install: "sh -c 'if command -v apt-get >/dev/null 2>&1 && ! command -v zstd >/dev/null 2>&1; then sudo apt-get update -qq && sudo apt-get install -y zstd; fi; curl -fsSL https://ollama.com/install.sh | sh'"
    enabled: true

  googleworkspace-cli:
    name: googleworkspace-cli
    # Provides the `gws` binary used by brain-morning-start,
    # brain-pull-my-meeting-notes, brain-prepare-my-deep-dives,
    # brain-prepare-my-one-on-one. On macOS: brew formula builds from
    # source (Rust). On Linux: fetch the prebuilt tarball that upstream
    # publishes for each release and drop `gws` into ~/.local/bin.
    check: "command -v gws"
    install: "sh -c 'if [ \"$(uname)\" = Darwin ]; then brew install googleworkspace-cli; elif [ \"$(uname)\" = Linux ]; then arch=$(uname -m); case \"$arch\" in aarch64|arm64) target=aarch64-unknown-linux-gnu ;; x86_64|amd64) target=x86_64-unknown-linux-gnu ;; *) echo \"gws: unsupported arch $arch\" >&2; exit 1 ;; esac; mkdir -p \"$HOME/.local/bin\"; tmp=$(mktemp -d); curl -fsSL \"https://github.com/googleworkspace/cli/releases/latest/download/google-workspace-cli-$target.tar.gz\" | tar -xz -C \"$tmp\"; install -m 0755 \"$tmp/gws\" \"$HOME/.local/bin/gws\"; rm -rf \"$tmp\"; else echo \"gws: unsupported platform $(uname)\" >&2; exit 1; fi'"
    enabled: true

  gcloud-cli:
    name: gcloud-cli
    # Provides `gcloud` and `bq`. On macOS: brew cask. On Linux: official
    # Google Cloud apt repo. After install, authenticate via `/super-setup`.
    check: "command -v gcloud && command -v bq"
    install: "sh -c 'if [ \"$(uname)\" = Darwin ]; then brew install --cask gcloud-cli; elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update -qq && sudo apt-get install -y apt-transport-https ca-certificates gnupg curl && curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg && echo \"deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main\" | sudo tee /etc/apt/sources.list.d/google-cloud-sdk.list >/dev/null && sudo apt-get update -qq && sudo apt-get install -y google-cloud-cli; else echo skip: unsupported platform; fi'"
    enabled: true

  gh-cli:
    name: gh-cli
    # GitHub CLI. Used by catalog.mjs to clone private repos via `gh repo
    # clone` (with git clone as the fallback when `gh` isn't installed).
    # Authenticate via `super onboard` or `gh auth login` manually.
    check: "command -v gh"
    install: "sh -c 'if [ \"$(uname)\" = Darwin ]; then brew install gh; elif command -v apt-get >/dev/null 2>&1; then sudo apt-get update -qq && sudo apt-get install -y curl ca-certificates && (type -p wget >/dev/null || sudo apt-get install -y wget) && sudo mkdir -p -m 755 /etc/apt/keyrings && wget -qO- https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg && echo \"deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main\" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null && sudo apt-get update -qq && sudo apt-get install -y gh; else echo skip: unsupported platform; fi'"
    enabled: true

# ─── CLIs ────────────────────────────────────────────────────────────────────
# Install commands for each supported CLI. `super install` will run these
# automatically if the CLI is not already on PATH.

clis:
  claude:
    install: "curl -fsSL https://claude.ai/install.sh | bash"
    check: "command -v claude"
    enabled: true
  gemini:
    # Try unprivileged first (Mac with user-owned npm prefix), fall back
    # to sudo on Linux where the system npm prefix is root-owned.
    install: "sh -c 'npm install -g @google/gemini-cli 2>/dev/null || sudo -n npm install -g @google/gemini-cli'"
    check: "command -v gemini"
    enabled: true
  codex:
    install: "sh -c 'npm install -g @openai/codex 2>/dev/null || sudo -n npm install -g @openai/codex'"
    check: "command -v codex"
    enabled: true

security:
  yoloMode: true
  writesOutsideProject: ask
  readsOutsideProject: allow
  bashExternalCalls: ask
  changeOwner: block
  githubCommands: allow
  dangerousRm: block
  envAccess: block
  sensitivePaths: block

session:
  autoName: true
  sessionLog: true
  transcriptLog: true
  cleanupOnStart: true
  maxAgeDays: 7
  injectContext: true

# ─── Skills ──────────────────────────────────────────────────────────────────
# source: owner/repo or owner/repo/subpath (GitHub)
# All CLIs: installed to .agents/skills/<name>/ (project-level shared root)
#
# Options:
#   - discover: <subpath>/  Auto-discover multiple skills from a subfolder within the repo.
#                         Each subdirectory containing SKILL.md becomes a separate skill.
#                         Use for repos like smnbss/brain that bundle multiple skills.

skills:
  gstack:
    source: garrytan/gstack
    setup: ./setup
    description: Dev workflow toolkit (review, security, ship, debug, QA)
    enabled: true
  playwright-cli:
    source: microsoft/playwright-cli/skills/playwright-cli
    description: Browser testing with Playwright
    enabled: true
# ─── Plugins ─────────────────────────────────────────────────────────────────
# Plugins are GitHub repos that bundle multiple skills (and optionally commands).
# Installing a plugin clones the repo and auto-discovers:
#   - Skills:   skills/*/SKILL.md  OR  plugins/*/skills/*/SKILL.md
#   - Commands: plugins/*/commands/*.md
#   - Claude marketplace config → .claude/settings.json
# Repos without discoverable content are treated as Claude-only marketplaces.

plugins:
  obra-superpowers:
    source: obra/superpowers
    description: Core methodology marketplace — code review, debugging, TDD, planning
    enabled: true
  weroad-ai:
    source: weroad/ai
    description: WeRoad AI — dbt-modeling, presentations, devops, data-analyst, codex
    enabled: true
  marketing-skills:
    source: marketingskills/marketing-skills
    description: Marketing skills — copy, SEO, ads, CRO, email, social
    enabled: true
  frontend-design:
    source: claude-plugins-official/frontend-design
    description: Production-grade UI design
    enabled: true
  skill-creator:
    source: claude-plugins-official/skill-creator
    description: Create and manage custom skills
    enabled: true
  telegram:
    source: claude-plugins-official/telegram
    description: Telegram bot integration
    enabled: true
  ralph-loop:
    source: claude-plugins-official/ralph-loop
    description: Ralph loop plugin
    enabled: true
  codex:
    source: openai-codex/codex
    description: OpenAI Codex CLI integration
    enabled: true

# ─── MCPs — Installable (stdio + http) ──────────────────────────────────────
# Installed to each CLI's native config:
#   Claude: .claude/settings.local.json (project-level, dict)
#   Gemini: ~/.gemini/settings.json (dict)
#   Codex:  ~/.codex/config.json (array format)
#
# type: http → url-based transport | type: stdio → command + args
#
# Use $env:VAR_NAME to reference secrets from .env.local (or .env).
# `super install` resolves these at install time and bakes the values
# into each CLI's config. Re-run `super install` after rotating tokens.

mcps:
  # Disabled — using bq CLI instead
  # bigquery:
  #   type: http
  #   url: https://bigquery.googleapis.com/mcp
  #   description: Google BigQuery via HTTP MCP (uses ADC token)
  #   enabled: false
  linear:
    type: http
    url: https://mcp.linear.app/mcp
    headers:
      Authorization: "Bearer $env:LINEAR_TOKEN"
    description: Linear project management (requires LINEAR_TOKEN in .env.local)
    enabled: true
  metabase:
    type: stdio
    command: npx
    args: ["-y", "@cognitionai/metabase-mcp-server", "--all"]
    env:
      METABASE_URL: "$env:METABASE_URL"
      METABASE_API_KEY: "$env:METABASE_API_KEY"
    description: Metabase analytics (requires METABASE_URL, METABASE_API_KEY in .env.local)
    enabled: true
  design-system-extractor:
    type: stdio
    command: npx
    args: ["-y", "website-design-systems-mcp"]
    description: Extract design systems from any URL to DESIGN.md
    enabled: true
  chrome-devtools:
    type: stdio
    command: npx
    args: ["-y", "chrome-devtools-mcp@latest"]
    description: Chrome DevTools — screenshots, DOM, network, console
    enabled: true

# ─── MCPs — Remote (claude.ai Settings > Integrations) ──────────────────────
# Configured through the web UI, not CLI. Listed here as reference only.

remote_mcps:
  amplitude-eu:
    description: Amplitude EU analytics
    enabled: true
  atlassian:
    description: Jira + Confluence
    enabled: true
  clickup:
    description: ClickUp project management
    enabled: true
  deepwiki:
    description: AI-powered GitHub repo documentation
    enabled: true
  gmail:
    description: Gmail integration
    enabled: true
  google-calendar:
    description: Google Calendar
    enabled: true
  jam:
    description: Jam bug reporting
    enabled: true
  sentry:
    description: Sentry error tracking
    enabled: true
  slack:
    description: Slack messaging
    enabled: true
  n8n:
    description: n8n workflow automation
    enabled: true
  canva:
    description: Canva design
    enabled: false
  gamma:
    description: Gamma presentations
    enabled: false
  ahrefs:
    description: Ahrefs SEO
    enabled: false

project:
  lintCommand: ""
  typeCheckCommand: ""

hooks:
  preToolUse:
    enabled: true
    enforceSecurity: true
  permissionRequest:
    enabled: true
    autoAllowReads: true
    autoAllowSafeBash: true
  userPromptSubmit:
    enabled: true
    logPrompts: true
  postToolUse:
    enabled: true
    runValidators: true
  sessionStart:
    enabled: true
  sessionEnd:
    enabled: true
    saveTranscript: true
  stop:
    enabled: true
    saveTranscript: true

statusLine:
  enabled: true

crossAgent:
  syncMcpServers: false
  shareContext: true
  unifiedSkills: true
